<html>
  <head>
    <title>STRINGEE OTP IN CALL SAMPLE</title>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=0, minimal-ui"
    />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
      integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSQX0FslNhTDadL4O5SAGapGt4FodqL8My0mA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <style>
      .select-lang {
        padding: 10px 20px;
        font-size: 1.2em;
        border-radius: 5px;
        border: none;
        cursor: pointer;
        margin-bottom: 20px;
      }
      code {
        background-color: #444;
        padding: 2px 4px;
        border-radius: 4px;
        color: #fff;
        overflow-wrap: break-word;
        max-width: 90%;
        text-wrap: auto;
      }
    </style>
    <script lang="javascript">
      const text = {
        vn: {
          title: "STRINGEE OTP IN CALL SAMPLE",
          message: "Bạn cần gọi đến số hotline để xác minh mã OTP",
          inputPhone: "Số điện thoại",
          submit: "Tiếp tục",
          verifyCall:
            'Vui lòng gọi đến <a href="tel:${number},${OTPCode}">${number}</a> từ số điện thoại ${phone} và nhập mã OTP',
        },
        en: {
          title: "STRINGEE OTP IN CALL SAMPLE",
          message: "You need to call the hotline number to verify the OTP code",
          inputPhone: "Phone number",
          submit: "Continue",
          verifyCall:
            'Please call <a href="tel:${number},${OTPCode}">${number}</a> from phone number ${phone} and enter the OTP code',
          verifyCall2:
            'Please call <a href="tel:${number}">${number}</a> from phone number ${phone} to hear the OTP code',
        },
      };
      var lang = "vn";
    </script>
  </head>
  <body style="color: white; background-color: #607d8b; margin-top: 50px">
    <div style="text-align: center">
      <div>
        <select
          class="select-lang"
          id="lang"
          onchange="setLanguage(this.value)"
        >
          <option value="vn">Vietnamese</option>
          <option value="en">English</option>
        </select>
      </div>
      <div>
        <h2 id="title">STRINGEE OTP IN CALL SAMPLE</h2>
        <p id="message">Bạn cần gọi đến số hotline để xác minh mã OTP</p>
      </div>
      <div>
        <h2 id="inputPhone">Nhập SĐT của bạn</h2>
        <div
          style="
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
          "
        >
          <span>+</span>
          <input
            style="padding: 10px; font-size: 1.2em"
            autocomplete="tel"
            type="tel"
            id="phone"
            placeholder="84xxxxxxxxxx"
          />
        </div>
        <div style="margin: 20px">
          <button style="font-size: 1.3em" type="button" id="submit">
            Tiếp tục
          </button>
          <br />
          <br />
        </div>
      </div>

      <div id="result" style="text-align: center"></div>
      <div
        id="qrcode"
        style="
          margin: 20px;
          text-align: center;
          display: flex;
          width: 100vw;
          justify-content: center;
        "
      ></div>
    </div>
  </body>

  <script>
    const baseUrl = `https://hubsms123.com/1.0/auth`;
    const inputElm = document.getElementById("phone");
    const buttonElm = document.getElementById("submit");
    const resultElm = document.getElementById("result");
    var checkInterval = 0;

    buttonElm.addEventListener("click", () => {
      const phone = inputElm.value;
      fetch(`${baseUrl}/incall`, {
        method: "POST",
        headers: {
          Accept: "application/json",
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ phone: phone }),
      })
        .then(async (result) => {
          let data = await result.json();
          if (data.status !== "success") {
            throw Error(data.message);
          }
          let div = `<h4>${data.message}</h4>`;
          div += `<h1 style="color:#FF5722">${data.data.OTPCode}</h1>`;

          if (window.innerWidth < 800) {
            div += `<a style="font-size: 1.2em;" href="tel:${data.data.number},${data.data.OTPCode}">Gọi xác minh</a>`;
          } else {
            // nếu trên máy tính thì hiện QR code
            div += `Hoặc sử dụng điện thoại quét mã dưới đây để thực hiện cuộc gọi xác minh`;
            document.getElementById("qrcode").innerHTML = ``;
            new QRCode(
              document.getElementById("qrcode"),
              `tel:${data.data.number},${data.data.OTPCode}`,
            );
          }

          resultElm.innerHTML = div;
          resultElm.prepend(`.`);
          checkVerify(data.data.authToken, phone, new Date(data.data.expireAt));
        })
        .catch((error) => {
          alert(error.message);
          requestExpired();
        });
    });
    function checkVerify(authToken, phone, expireAt) {
      let body = {
        authToken: authToken,
        phone: phone,
      };
      clearInterval(checkInterval);
      checkInterval = setInterval(() => {
        fetch(`${baseUrl}/incall/check`, {
          method: "POST",
          headers: {
            Accept: "application/json",
            "Content-Type": "application/json",
          },
          body: JSON.stringify(body),
        }).then(async (result) => {
          let data = await result.json();
          if (data.status === "success" && data.data) {
            let div = `<h4 style="color:green">${data.message}</h4>`;
            div += `access token: <code>${data.data.accessToken}</code>`;
            resultElm.innerHTML = div;
            clearInterval(checkInterval);
            document.getElementById("qrcode").innerHTML = ``;
          } else {
            resultElm.prepend(`.`);

            // check thời gian chờ
            let currentTime = new Date();
            if (currentTime.getTime() > expireAt.getTime()) {
              requestExpired();
            }
          }
        });
      }, 3000);
    }

    // thời gian chờ đã hết
    function requestExpired() {
      clearInterval(checkInterval);
      resultElm.innerHTML = ``;
      document.getElementById("qrcode").innerHTML = ``;
    }

    // xử lý ngôn ngữ
    function getMessage(key) {
      if (text[lang][key]) {
        return text[lang][key];
      }
      return text.en[key];
    }

    // set message cho element
    function setMessage(key, value) {
      document.getElementById(key).textContent = value;
    }

    // set language
    function setLanguage(language) {
      lang = language;
      setMessage("title", getMessage("title"));
      setMessage("message", getMessage("message"));
      setMessage("inputPhone", getMessage("inputPhone"));
      setMessage("submit", getMessage("submit"));
      setMessage("verifyCall", getMessage("verifyCall"));
      setMessage("verifyCall2", getMessage("verifyCall2"));
    }
  </script>
</html>
