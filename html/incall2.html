<html>

    <head>
        <title>STRINGEE OTP IN CALL-2 SAMPLE</title>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0, minimal-ui">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSQX0FslNhTDadL4O5SAGapGt4FodqL8My0mA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <style lang="css">
        .select-lang {
            padding: 10px 20px;
            font-size: 1.2em;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            margin-bottom: 20px;
        }
    </style>
    <script lang="javascript">
        const text = {
            vn: {
            title: "STRINGEE OTP IN CALL-2 SAMPLE",
            message: "Bạn cần gọi đến số hotline để nghe mã OTP",
            inputPhone: "Số điện thoại",
            inputOtp: "Mã OTP",
            submit: "Tiếp tục",
            verify: "Xác minh",
            verifyCall:
                'Vui lòng gọi đến <a href="tel:${number},${OTPCode}">${number}</a> từ số điện thoại ${phone} và nhập mã OTP',
            verifyCall2:
                'Vui lòng gọi đến <a href="tel:${number}">${number}</a> từ số điện thoại ${phone} để nghe mã OTP',
            },
            en: {
            title: "STRINGEE OTP IN CALL-2 SAMPLE",
            message:
                "You need to call the hotline number to verify the OTP code",
            inputPhone: "Phone number",
            inputOtp: "OTP code",
            submit: "Continue",
            verify: "Verify",
            verifyCall:
                'Please call <a href="tel:${number},${OTPCode}">${number}</a> from phone number ${phone} and enter the OTP code',
            verifyCall2:
                'Please call <a href="tel:${number}">${number}</a> from phone number ${phone} to hear the OTP code',
            },
        };
    </script>
    </head>
    <body style="color: white; background-color: #607D8B; margin-top: 50px;">

        <div style="text-align: center;">
            <div>
                <select class="select-lang" id="lang" onchange="setLanguage(this.value)">
                    <option value="vn">Tiếng Việt</option>
                    <option value="en">English</option>
                </select>
            </div>
                <h2 id="title">STRINGEE OTP IN CALL-2 SAMPLE</h2>
                <p id="message">Bạn cần gọi đến số hotline để nghe mã OTP</p>
            </div>
            <div style="margin: 0 auto; max-width: 500px; text-align: center;"  >
                <h2 id="inputPhone">Nhập SĐT của bạn</h2>
                <div style="display: flex; justify-content: center; align-items: center; gap: 10px;">
                    <span>+</span>
                    <input style="padding: 10px; font-size: 1.2em" autocomplete="tel" type="tel" id="phone" placeholder="84xxxxxxxxxx">
                </div>
                <div style="margin: 20px ;">
                    <button style="font-size: 1.3em;" type="button" id="submit">Tiếp tục</button>
                    <br>
                    <br>
                </div>
            </div>
        </div>

        <div id="result" style="text-align: center;"></div>
        <div id="otp" style="text-align: center; display: none;">

            <div>
                <input style="padding: 10px;
                    font-size: 1.2em" type="text" id="inputOtp" placeholder="Mã OTP">
                <br>
            </div>
            <div style="margin: 20px ;">
                <button style="font-size: 1.3em;" type="button" id="verify">Xác minh</button>
                <br>
                <br>
            </div>

        </div>

    

    </body>

    <script>
        const baseUrl = `https://hubsms123.com/1.0/auth`;
        const inputElm = document.getElementById('phone');
        const buttonElm = document.getElementById('submit');
        const resultElm = document.getElementById('result');
        const otpElm = document.getElementById('otp');
        const inputOtpElm = document.getElementById('inputOtp');
        const buttonVerifyElm = document.getElementById('verify');
        var authToken = null;
        var phone = null;

        buttonElm.addEventListener('click', () => {
            phone =  inputElm.value;
            fetch(`${baseUrl}/incall2`, {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({phone: phone})
            }).then(async (result) => {
            
                let data = await result.json();
                if(data.status !== 'success') {
                    throw Error(data.message);
                }
                authToken = data.data.authToken;
                let div = `<h4>${data.message}</h4>`;
        
                resultElm.innerHTML = div;
                otpElm.style.display = 'block';
                buttonElm.setAttribute("disabled", true);
        
            }).catch(error => { 
                alert(error.message);
            });

        });
        buttonVerifyElm.addEventListener('click', () => {

            let otpCode =  inputOtpElm.value;
            verifyOTP(authToken, phone, otpCode);

        });
        function verifyOTP(authToken, phone, otpCode) {

            let body = {
                authToken: authToken,
                phone: phone,
                otpCode: otpCode
            }

                fetch(`${baseUrl}/incall2/verify`, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                }).then(async (result) => {
                    let data = await result.json();
                    if(data.status === 'success' && data.data) {

                        let div = `<h4 style="color:green">${data.message}</h4>`;
                        div += `access token: <i>${data.data.accessToken}</i>`;
                        resultElm.innerHTML = div;
                        otpElm.style.display = 'none';
                    } else {

                        alert(data.message);
                    }
                    

                })



        }

        function setLanguage(value) {
            lang = value;
            document.getElementById("title").innerHTML = text[lang].title;
            document.getElementById("message").innerHTML = text[lang].message;
            document.getElementById("inputPhone").innerHTML = text[lang].inputPhone;
            document.getElementById("inputOtp").placeholder = text[lang].inputOtp;
            document.getElementById("submit").innerHTML = text[lang].submit;
            document.getElementById("verify").innerHTML = text[lang].verify;
        }
    </script>

</html>
